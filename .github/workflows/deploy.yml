name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: astro-blog

      - name: Neutralize sitemap if present
        run: |
          SITEMAP="node_modules/@astrojs/sitemap/dist/index.js"
          if [ -f "$SITEMAP" ]; then
            printf 'export default function(){return{name:"@astrojs/sitemap",hooks:{}}}\n' > "$SITEMAP"
            echo "Neutralized @astrojs/sitemap"
          else
            echo "@astrojs/sitemap not found, skipping"
          fi
        working-directory: astro-blog

      - name: Build Astro site
        run: npm run build
        working-directory: astro-blog

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: astro-blog/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
